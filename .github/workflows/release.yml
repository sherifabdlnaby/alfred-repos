name: Release

# PR merge → semver tag → build .alfredworkflow → publish release
# PR labels control version bump: major, minor, patch (default), skip-release
# Manual trigger also supported via workflow_dispatch (with optional draft mode)

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. v1.2.3). Leave empty to auto-detect from last PR."
        required: false
        type: string
      draft:
        description: "Keep as draft release after all artifacts are built."
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── Autolabel PRs ───────────────────────────────────────────────────
  autolabel:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: release-drafter/release-drafter@v5
        with:
          config-name: auto-release.yml
          disable-releaser: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Determine version ──────────────────────────────────────────────
  version:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.version.outputs.new_tag }}
      version: ${{ steps.version.outputs.version }}
      pr_number: ${{ steps.pr.outputs.number }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find merged PR and determine bump
        if: github.event_name == 'push'
        id: pr
        run: |
          PR_JSON=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '[.[] | select(.merged_at != null and .base.ref == "main")] | .[0] // empty' 2>/dev/null || echo "")

          if [ -z "$PR_JSON" ]; then
            echo "No merged PR found for commit ${{ github.sha }}, skipping release"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          PR_NUM=$(echo "$PR_JSON" | jq -r '.number')
          LABELS=$(echo "$PR_JSON" | jq -r '[.labels[].name] | join(",")')
          echo "number=$PR_NUM" >> $GITHUB_OUTPUT
          echo "labels=$LABELS" >> $GITHUB_OUTPUT
          echo "Found merged PR #$PR_NUM with labels: $LABELS"

          if echo "$LABELS" | grep -q "skip-release"; then
            echo "skip-release label found, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if echo "$LABELS" | grep -q "major"; then
            echo "bump=major" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q "minor"; then
            echo "bump=minor" >> $GITHUB_OUTPUT
          else
            echo "bump=patch" >> $GITHUB_OUTPUT
          fi

      - name: Compute next version
        if: >-
          (github.event_name == 'push' && steps.pr.outputs.skip != 'true') ||
          github.event_name == 'workflow_dispatch'
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            NEW_TAG="${{ inputs.version }}"
            [[ "$NEW_TAG" != v* ]] && NEW_TAG="v${NEW_TAG}"
            echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
            echo "version=${NEW_TAG#v}" >> $GITHUB_OUTPUT
            echo "Manual release: $NEW_TAG"
            exit 0
          fi

          BUMP="${{ steps.pr.outputs.bump }}"
          # Default to patch for manual dispatch without explicit version
          if [ -z "$BUMP" ]; then
            BUMP="patch"
          fi

          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -v '-' | head -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "Previous tag: $LATEST_TAG"

          VERSION="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH="${PATCH%%-*}"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "version=${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT
          echo "Version bump: $BUMP ($LATEST_TAG -> $NEW_TAG)"

  # ── Build and release ──────────────────────────────────────────────
  release:
    needs: version
    if: needs.version.outputs.new_tag != ''
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Create and push tag
        run: |
          TAG="${{ needs.version.outputs.new_tag }}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists, skipping"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies into src/
        run: uv pip install --target src/ alfred-pyworkflow docopt --quiet --system

      - name: Build .alfredworkflow
        env:
          VERSION: ${{ needs.version.outputs.new_tag }}
        working-directory: ./src
        run: |
          set -e
          version_without_v=$(echo "${VERSION}" | sed 's/^v//')
          sed -i "s/1.3.37/${version_without_v}/g" "./info.plist"

          mkdir -p build
          find . -not -path '*/build*' -not -path '*/__pycache__/*' -not -name '*.pyc' -exec zip --symlinks "build/alfred-repos-${VERSION}.alfredworkflow" {} +
          echo "artifactPath=${PWD}/build/alfred-repos-${VERSION}.alfredworkflow" >> $GITHUB_ENV

      - name: Create release with artifact
        run: |
          TAG="${{ needs.version.outputs.new_tag }}"
          DRAFT_FLAG=""
          if [ "${{ inputs.draft }}" = "true" ]; then
            DRAFT_FLAG="--draft"
          fi
          gh release create "${TAG}" "${{ env.artifactPath }}" \
            --title "${TAG}" \
            --generate-notes \
            --latest \
            $DRAFT_FLAG

      - name: Comment on PR
        if: github.event_name == 'push' && needs.version.outputs.pr_number != ''
        run: |
          TAG="${{ needs.version.outputs.new_tag }}"
          gh pr comment ${{ needs.version.outputs.pr_number }} --body "🚀 **Release ${TAG}** published!

          **Assets:**
          - [\`alfred-repos-${TAG}.alfredworkflow\`](https://github.com/${{ github.repository }}/releases/tag/${TAG})"
